<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circleClip)">
    <!-- Orange top section -->
    <path d="M 0,0 L 100,0 L 100,30 Q 90,25 80,30 Q 70,35 60,32 Q 50,30 40,32 Q 30,35 20,30 Q 10,25 0,30 Z" fill="#FF6B35"/>
    <!-- First wavy white stripe -->
    <path d="M 0,30 Q 25,28 50,32 Q 75,36 100,30 L 100,35 Q 75,33 50,37 Q 25,41 0,35 Z" fill="white"/>
    <!-- Second orange section -->
    <path d="M 0,35 Q 25,33 50,37 Q 75,41 100,35 L 100,45 Q 75,43 50,47 Q 25,51 0,45 Z" fill="#FF6B35"/>
    <!-- Second wavy white stripe -->
    <path d="M 0,45 Q 25,43 50,47 Q 75,51 100,45 L 100,50 Q 75,48 50,52 Q 25,56 0,50 Z" fill="white"/>
    <!-- Dark blue bottom section -->
    <path d="M 0,50 Q 25,48 50,52 Q 75,56 100,50 L 100,100 L 0,100 Z" fill="#1E3A5F"/>
    <!-- Third wavy white stripe in blue section -->
    <path d="M 0,60 Q 25,58 50,62 Q 75,66 100,60 L 100,65 Q 75,63 50,67 Q 25,71 0,65 Z" fill="white"/>
  </g>
</svg>


