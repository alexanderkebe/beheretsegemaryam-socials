<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Golden Yellow Six-Pointed Star -->
  <g transform="translate(50, 50)">
    <!-- Six rhombus shapes forming a star - arranged radially -->
    <g transform="rotate(0)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <g transform="rotate(60)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <g transform="rotate(120)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <g transform="rotate(180)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <g transform="rotate(240)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <g transform="rotate(300)">
      <path d="M 0,-35 L 12,-12 L 0,12 L -12,-12 Z" fill="#FFD700" stroke="white" stroke-width="0.5"/>
    </g>
    <!-- Central hexagon (negative space from white lines) -->
    <polygon points="-7,-4 7,-4 14,0 7,4 -7,4 -14,0" fill="white"/>
  </g>
</svg>


